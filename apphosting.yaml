# Firebase App Hosting configuration
# Safe to commit: secrets are stored in Cloud Secret Manager.

runConfig:
  # Keep costs low by default; tune as needed in Firebase Console or per-env yaml.
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # LINE Messaging API
  - variable: LINE_CHANNEL_SECRET
    secret: lineChannelSecret
    availability:
      - RUNTIME
  - variable: LINE_CHANNEL_ACCESS_TOKEN
    secret: lineChannelAccessToken
    availability:
      - RUNTIME

  # Google Gemini
  - variable: GEMINI_API_KEY
    secret: geminiApiKey
    availability:
      - RUNTIME
  - variable: GEMINI_MODEL
    value: gemini-2.5-flash-lite
    availability:
      - RUNTIME

  # Admin / Google Sheets (Pass system)
  - variable: ADMIN_API_KEY
    secret: adminApiKey
    availability:
      - RUNTIME
  # Firebase Auth: ตั้งค่าใน Firebase Console (env vars) ถ้าต้องการใช้
  # ADMIN_FIREBASE_EMAILS, ADMIN_FIREBASE_UIDS, NEXT_PUBLIC_FIREBASE_*
  - variable: ADMIN_LINE_USER_IDS
    secret: adminLineUserIds
    availability:
      - RUNTIME
  - variable: GOOGLE_SERVICE_ACCOUNT_KEY_BASE64
    secret: googleServiceAccountKeyBase64
    availability:
      - RUNTIME
  - variable: GOOGLE_SHEETS_ID
    secret: googleSheetsId
    availability:
      - RUNTIME
  - variable: INDEX_SHEET_GID
    value: "1143152346"
    availability:
      - RUNTIME
  - variable: SLIP_SHEET_GID
    value: "2094374026"
    availability:
      - RUNTIME
  - variable: ADMIN_TELEGRAM_USER_IDS
    secret: adminTelegramUserIds
    availability:
      - RUNTIME
  - variable: TELEGRAM_BOT_TOKEN
    secret: telegramBotToken
    availability:
      - RUNTIME
  - variable: TELEGRAM_DASHBOARD_URL
    value: "https://jaihan-assistant--jaihan-assistant.asia-southeast1.hosted.app/dashboard"
    availability:
      - RUNTIME
