# Firebase App Hosting configuration
# Safe to commit: secrets are stored in Cloud Secret Manager.

runConfig:
  # Keep costs low by default; tune as needed in Firebase Console or per-env yaml.
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # LINE Messaging API
  - variable: LINE_CHANNEL_SECRET
    secret: lineChannelSecret
    availability:
      - RUNTIME
  - variable: LINE_CHANNEL_ACCESS_TOKEN
    secret: lineChannelAccessToken
    availability:
      - RUNTIME

  # Google Gemini
  - variable: GEMINI_API_KEY
    secret: geminiApiKey
    availability:
      - RUNTIME
  - variable: GEMINI_MODEL
    value: gemini-2.5-flash-lite
    availability:
      - RUNTIME

  # Admin / Google Sheets (Pass system)
  - variable: ADMIN_API_KEY
    secret: adminApiKey
    availability:
      - RUNTIME
  - variable: ADMIN_LINE_USER_IDS
    value: "Ude812c4b7497cbbf6400967dcf93f17d"
    availability:
      - RUNTIME
  - variable: GOOGLE_SERVICE_ACCOUNT_KEY_BASE64
    secret: googleServiceAccountKeyBase64
    availability:
      - RUNTIME
  - variable: GOOGLE_SHEETS_ID
    value: 19PDcY3p7ouSpnU9Fgp9qoW-LBN39AgQYgUUizDXUbVo
    availability:
      - RUNTIME

